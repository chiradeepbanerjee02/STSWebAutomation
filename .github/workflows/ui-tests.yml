name: UI Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ui-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Start Apache Superset
        run: |
          docker run -d \
            -p 8088:8088 \
            -e SUPERSET_SECRET_KEY=supersecretkey123 \
            --name superset \
            apache/superset
          sleep 15  # wait for container process to be ready before running exec commands
          docker exec superset superset db upgrade
          docker exec superset superset fab create-admin \
            --username admin \
            --firstname Admin \
            --lastname Admin \
            --email admin@example.com \
            --password general
          docker exec superset superset init
          timeout 120 bash -c 'until curl -sf http://localhost:8088/login/; do sleep 3; done' \
            || { echo "Superset failed to start within 120 seconds"; exit 1; }

      - name: Run UI tests
        run: |
          mkdir -p reports
          pytest --html=reports/report.html --self-contained-html -v
        continue-on-error: true

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-report
          path: reports/
          retention-days: 30
